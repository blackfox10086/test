<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Security: Content Security Policy restricts all scripts and styles
    to this origin only. This significantly limits what injected XSS
    payloads can load or execute, even if HTML injection occurs. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self';">
    <title>Oxfam Hong Kong Donation</title>
    <link rel="stylesheet" href="style_D.css">
    <script src="donation.js" defer></script>
</head>

<body>
    <div class="wrapper">
        <div class="panel">

            <section id="donationSection" class="card">
                <div class="card-head">
                    <div class="badge">Oxfam Hong Kong</div>
                    <h1>Donation</h1>
                    <p>Please complete your donation details.</p>
                </div>

                <div id="donationFormWrap">
                    <form id="donationForm">
                        <label for="donorName">Name</label>
                        <input type="text" id="donorName" name="donorName" placeholder="Enter your name" required>

                        <label for="donorEmail">Email</label>
                        <input type="email" id="donorEmail" name="donorEmail" placeholder="Enter your email"
                            autocomplete="email" required>

                        <label for="donorPhone">Phone no.</label>
                        <input type="tel" id="donorPhone" name="donorPhone" placeholder="Enter your phone number"
                            autocomplete="tel" required>

                        <label for="donationAmount">Amount</label>
                        <input type="number" id="donationAmount" name="donationAmount"
                            placeholder="Enter donation amount" min="1" required>

                        <div class="form-group">
                            <label for="donationCurrency">Currency</label>
                            <select id="donationCurrency" name="currency" required>
                                <option value="HKD">HKD</option>
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                                <option value="GBP">GBP</option>
                                <option value="JPY">JPY</option>
                                <option value="CNY">CNY</option>
                            </select>
                        </div>

                        <button type="submit">Donate</button>
                        <div id="donationMessageBox" class="message" aria-live="polite"></div>


                    </form>
                </div>

                <div id="thankYouBox" class="thank-you hidden" aria-live="polite">
                    <h2>Thanks For Donation</h2>
                    <p>Your donation has been submitted successfully.</p>
                </div>
            </section>

        </div>
    </div>
</body>

</html>
